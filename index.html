<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Körjournal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div id="app">
        <header>
            <h1>Körjournal</h1>
        </header>

        <main>
            <section id="status-display">
                <div class="stat-box speed-box">
                    <span class="label">Hastighet</span>
                    <div><span id="current-speed">0</span> <small>km/h</small></div>
                </div>
                <div class="stat-box">
                    <span class="label">Tid</span>
                    <span id="current-time">00:00:00</span>
                </div>
                <div class="stat-box">
                    <span class="label">Sträcka</span>
                    <span id="current-distance">0.00</span> <small>km</small>
                </div>
            </section>

            <section id="controls">
                <button id="toggle-btn" class="start">STARTA RESA</button>
            </section>

            <section id="history">
                <h2>Tidigare resor</h2>
                <ul id="trip-list">
                    <!-- Resor hamnar här -->
                </ul>
            </section>
        </main>

        <div id="dimmer-overlay" class="hidden"></div>
        
        <!-- Modal för att namnge sammanslagen resa -->
        <div id="merge-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h3>Namnge resa</h3>
                <p>Ge din sammanslagna resa ett namn för att spara den.</p>
                <input type="text" id="merge-name-input" placeholder="Ex: Morgonpendling" autofocus>
                <div class="modal-actions">
                    <button id="merge-cancel-btn" class="secondary-btn">Avbryt</button>
                    <button id="merge-save-btn" class="primary-btn">Spara</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
